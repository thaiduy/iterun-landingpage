<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffaa28"/>
      <stop offset="100%" stop-color="#ff4420"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a28" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff4420" stop-opacity="0.5"/>
    </linearGradient>
    <clipPath id="phone-clip">
      <rect x="680" y="-40" width="440" height="720" rx="52"/>
    </clipPath>
    <clipPath id="icon-clip">
      <rect x="60" y="60" width="80" height="80" rx="18"/>
    </clipPath>
    <filter id="phone-shadow">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle noise overlay for depth -->
  <rect width="1200" height="630" fill="rgba(0,0,0,0.08)"/>

  <!-- Right fade overlay so text stays readable -->
  <rect x="500" y="0" width="700" height="630" fill="url(#fade)"/>

  <!-- App icon -->
  <image href="appicon_greek.png" x="60" y="60" width="80" height="80" clip-path="url(#icon-clip)"/>

  <!-- App name -->
  <text x="160" y="115" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-0.5">Iterun</text>

  <!-- Headline line 1 -->
  <text x="60" y="300" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-2">Train smarter.</text>

  <!-- Headline line 2 -->
  <text x="60" y="375" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-2">Run your first 10K.</text>

  <!-- Subtitle -->
  <text x="60" y="440" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.82)" letter-spacing="-0.2">AI-powered training plans for new runners.</text>

  <!-- Free badge -->
  <rect x="60" y="480" width="160" height="44" rx="22" fill="white"/>
  <text x="140" y="508" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="15" font-weight="700" fill="#ff5a20" text-anchor="middle" letter-spacing="0.2">Free on TestFlight</text>

  <!-- Screenshot -->
  <g filter="url(#phone-shadow)">
    <image href="img_scnsht_01.png" x="680" y="-40" width="440" height="720" clip-path="url(#phone-clip)" preserveAspectRatio="xMidYMin slice"/>
  </g>
</svg>
